name: CI — Build & Test (master)

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build-and-test:
    name: Build, Lint & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies (security check)
        run: npm audit --audit-level=high

      - name: Check for outdated dependencies (informational — does not fail CI)
        run: npm outdated || true

      - name: Lint (non-blocking until ESLint is configured)
        # Angular 17 does not ship with ESLint by default.
        # Run: ng add @angular-eslint/schematics  to enable strict linting,
        # then remove the "|| true" below to enforce lint failures in CI.
        run: npm run lint || true

      - name: Build (production)
        run: npm run build -- --configuration production

      - name: Run unit tests (headless)
        run: npm test -- --watch=false --browsers=ChromeHeadless

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: dist/
          retention-days: 14
