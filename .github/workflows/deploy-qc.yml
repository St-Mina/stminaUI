name: Deploy Main to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-main
  cancel-in-progress: true

jobs:
  build:
    name: Build Main
    runs-on: ubuntu-latest
    env:
      # Subpath GitHub Pages serves the site from. Adjust if the repo is renamed.
      BASE_HREF: /stminaUI/
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Write environment files from secrets
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: |
          cat > src/environments/environment.ts <<EOF
          export const environment = {
            production: true,
            youtubeApiKey: '${YOUTUBE_API_KEY}',
            youtubeChannelHandle: 'StMinaNashville'
          };
          EOF
          cp src/environments/environment.ts src/environments/environment.development.ts

      - name: Build (production, Pages base-href)
        run: npm run build -- --configuration production --base-href "${BASE_HREF}"

      - name: Resolve output dir + SPA fallback
        id: outdir
        run: |
          OUT_DIR=$(find dist -maxdepth 3 -type d -name browser | head -n 1)
          if [ -z "$OUT_DIR" ]; then OUT_DIR=$(ls -d dist/*/ | head -n 1 | sed 's:/*$::'); fi
          echo "Publishing from: $OUT_DIR"
          cp "$OUT_DIR/index.html" "$OUT_DIR/404.html"
          echo "out_dir=$OUT_DIR" >> "$GITHUB_OUTPUT"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ steps.outdir.outputs.out_dir }}

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
