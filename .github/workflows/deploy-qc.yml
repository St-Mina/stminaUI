name: Deploy to QC

on:
  # Manual trigger — available from the Actions tab
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for deploying to QC'
        required: false
        default: 'Manual QC deployment'

  # Also fires automatically when a PR is merged into qc
  pull_request:
    branches:
      - qc
    types:
      - closed

jobs:
  deploy-qc:
    name: Deploy to QC Environment
    # For the pull_request trigger, only run when the PR was actually merged
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' && github.event.pull_request.merged == true)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    environment:
      name: QC
      url: https://qc.stminaui.example.com   # replace with your actual QC URL

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build (QC / development configuration)
        run: npm run build -- --configuration development

      - name: Deploy to QC
        run: |
          echo "Deploying to QC environment..."
          # Replace the block below with your actual deployment command, e.g.:
          #   aws s3 sync dist/ s3://your-qc-bucket --delete
          #   firebase deploy --only hosting:qc
          #   scp -r dist/ user@qc-server:/var/www/html
          echo "Deployment to QC complete."

      - name: Notify deployment
        run: |
          echo "QC deployment triggered by: ${{ github.actor }}"
          echo "Reason: ${{ github.event.inputs.reason || 'Merge into qc branch' }}"
